<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>АКЦИИ ДЛЯ КЛИЕНТОВ</title>
  <style>
    :root{
      --bg:#0b0f17;
      --card:#121a27;
      --muted:#9aa6bb;
      --text:#e9f0ff;
      --accent:#4aa3ff;
      --accent2:#7c5cff;
      --border:rgba(255,255,255,.10);
      --shadow:0 14px 40px rgba(0,0,0,.38);
      --radius:18px;
      --radius2:14px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background:
        radial-gradient(1200px 700px at 18% -10%, rgba(124,92,255,.22), transparent 60%),
        radial-gradient(900px 600px at 90% 10%, rgba(74,163,255,.18), transparent 55%),
        var(--bg);
      color:var(--text);
      line-height:1.35;
    }
    header{
      position:sticky; top:0; z-index:20;
      backdrop-filter: blur(10px);
      background: rgba(11,15,23,.72);
      border-bottom: 1px solid var(--border);
    }
    .wrap{max-width:1120px;margin:0 auto;padding:18px 16px;}
    .top{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
    .brand{display:flex; align-items:center; gap:12px;}
    .logo{
      width:38px;height:38px;border-radius:14px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      box-shadow: var(--shadow);
      flex: 0 0 auto;
    }
    h1{margin:0;font-size:18px;letter-spacing:.6px;text-transform:uppercase}
    .sub{margin-top:2px;color:var(--muted);font-size:13px}

    .controls{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    input[type="search"], select{
      background: rgba(255,255,255,.06);
      color: var(--text);
      border:1px solid var(--border);
      border-radius: 12px;
      padding:10px 12px;
      outline:none;
      min-width: 220px;
    }
    select{min-width: 180px;}

    main{padding: 18px 0 70px;}

    

    footer{padding: 0 0 60px;}
    .footerNotice{
      margin-top: 18px;
      padding: 16px 16px;
      border-radius: var(--radius);
      border: 1px solid rgba(255,199,74,.35);
      background: linear-gradient(135deg, rgba(255,199,74,.18), rgba(255,255,255,.02));
      box-shadow: var(--shadow);
    }
    .footerNoticeTitle{
      font-size: 12px;
      letter-spacing: .8px;
      text-transform: uppercase;
      color: rgba(255,255,255,.9);
      margin-bottom: 6px;
    }
    .footerNoticeText{color: rgba(233,240,255,.95); font-size: 14px;}
    .mono{font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;}
    .footerBtns{display:flex; gap:10px; flex-wrap:wrap; margin-top: 12px;}
.metaLine{display:flex;gap:10px;flex-wrap:wrap;color:var(--muted);font-size:12px;margin: 10px 0 0}
    .metaLine span{padding:4px 8px;border-radius:999px;background:rgba(255,255,255,.05);border:1px solid var(--border);}

    .grid{display:grid;grid-template-columns:1fr;gap:14px;margin-top:14px;}

    .card{
      background: linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.02));
      border:1px solid var(--border);
      border-radius: var(--radius);
      overflow:hidden;
      box-shadow: var(--shadow);
    }
    .cardGrid{display:grid;grid-template-columns: 360px 1fr;}
    .banner{border-right:1px solid var(--border);background:rgba(255,255,255,.03);position:relative;}
    .banner img{width:100%;height:100%;object-fit:cover;display:block;min-height:240px;}

    .badge{
      position:absolute; top:14px; left:14px;
      padding:7px 10px;border-radius:999px;font-size:12px;
      background: rgba(0,0,0,.45);
      border:1px solid rgba(255,255,255,.18);
      color:#fff;
      letter-spacing:.2px;
    }
    .badge.active{border-color: rgba(74,163,255,.45);}
    .badge.planned{border-color: rgba(255,199,74,.45);}
    .badge.ended{border-color: rgba(255,92,92,.45);}

    .content{padding:18px 18px 16px;}
    .title{margin:0;font-size:22px;letter-spacing:.2px;}
    .pills{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;}
    .pill{padding:6px 10px;border-radius:999px;font-size:12px;background: rgba(255,255,255,.06);border:1px solid var(--border);}
    .pill.strong{border-color: rgba(74,163,255,.42);background: linear-gradient(135deg, rgba(74,163,255,.20), rgba(124,92,255,.14));}

    .block{margin-top:14px;padding:14px;border:1px solid var(--border);border-radius:var(--radius2);background:rgba(255,255,255,.03);}
    .block h3{margin:0 0 8px 0;font-size:13px;text-transform:uppercase;color:var(--muted);letter-spacing:.6px;}
    .block p{margin:0;font-size:14px;white-space:pre-wrap;}

    .actions{margin-top:14px;display:flex;gap:10px;flex-wrap:wrap;}
    .btn{
      display:inline-flex;align-items:center;gap:8px;
      padding:10px 12px;border-radius:12px;
      border:1px solid var(--border);
      background: rgba(255,255,255,.05);
      color:var(--text);text-decoration:none;font-size:13px;
      transition: transform .15s ease, filter .15s ease;
    }
    .btn:hover{transform: translateY(-1px); filter: brightness(1.06);}
    .btn.primary{
      border-color: rgba(74,163,255,.42);
      background: linear-gradient(135deg, rgba(74,163,255,.22), rgba(124,92,255,.16));
    }
    .btn.ghost{background: rgba(255,255,255,.02);}

    .footerRow{display:flex;gap:10px;justify-content:space-between;flex-wrap:wrap;
      padding:12px 18px;border-top:1px solid var(--border);background:rgba(255,255,255,.02);
      color:var(--muted);font-size:12px;
    }

    .empty{padding:18px;border:1px dashed var(--border);border-radius:var(--radius);color:var(--muted);text-align:center;background:rgba(255,255,255,.03);}.noteSmall{margin-top:10px;color:rgba(233,240,255,.78);font-size:12px;line-height:1.35;}


    @media (max-width: 900px){
      .cardGrid{grid-template-columns:1fr;}
      .banner{border-right:none;border-bottom:1px solid var(--border);}
      input[type="search"]{min-width: 180px;}
    }
  </style>
</head>
<body>
  <header>
    <div class="wrap top">
      <div class="brand">
        <div class="logo" aria-hidden="true"></div>
        <div>
          <h1>АКЦИИ ДЛЯ КЛИЕНТОВ</h1>
          <div class="sub" id="subline">Каталог акций с сортировкой и фильтрами</div>
          <div class="metaLine">
            <span id="countline">—</span>
            <span id="todayline">—</span>
          </div>
        </div>
      </div>

      <div class="controls">
        <input id="q" type="search" placeholder="Поиск по названию / бренду / условиям…" />
        <select id="status">
          <option value="all">Все статусы</option>
          <option value="active">Активные</option>
          <option value="planned">Планируются</option>
          <option value="ended">Завершены</option>
        </select>
        <select id="sort">
          <option value="smart">Сначала актуальные</option>
          <option value="start_asc">По дате старта (↑)</option>
          <option value="start_desc">По дате старта (↓)</option>
          <option value="end_asc">По дате окончания (↑)</option>
          <option value="end_desc">По дате окончания (↓)</option>
        </select>
      </div>
    </div>
  </header>

  <main class="wrap">
    <div id="list" class="grid"></div>
    <div id="empty" class="empty" style="display:none;">Ничего не найдено по текущим фильтрам.</div>
  </main>

    // ===== Утилиты =====
    const elList = document.getElementById("list");
    const elEmpty = document.getElementById("empty");
    const elQ = document.getElementById("q");
    const elStatus = document.getElementById("status");
    const elSort = document.getElementById("sort");
    const elCountLine = document.getElementById("countline");
    const elTodayLine = document.getElementById("todayline");

    function parseDate(iso) {
      // iso: YYYY-MM-DD
      const [y,m,d] = String(iso).split("-").map(Number);
      return new Date(y, (m||1)-1, d||1);
    }

    function fmtRange(startIso, endIso){
      const s = parseDate(startIso).toLocaleDateString("ru-RU");
      const e = parseDate(endIso).toLocaleDateString("ru-RU");
      return `${s} – ${e}`;
    }

    function statusOf(p, now = new Date()) {
      const start = parseDate(p.startDate);
      const end = parseDate(p.endDate);
      // end inclusive:
      end.setHours(23,59,59,999);
      if (now < start) return "planned";
      if (now > end) return "ended";
      return "active";
    }

    const statusLabel = (s) => ({ active:"Активна", planned:"Планируется", ended:"Завершена" }[s] || s);

    function escapeHtml(str){
      return String(str ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function btn(href, text, cls="btn") {
      if (!href) return "";
      return `<a class="${cls}" href="${escapeHtml(href)}" target="_blank" rel="noopener">${text}</a>`;
    }

    function card(p){
      const st = statusOf(p);
      const badgeClass = `badge ${st}`;

      return `
        <article class="card" data-id="${escapeHtml(p.id)}">
          <div class="cardGrid">
            <div class="banner">
              <div class="${badgeClass}">${statusLabel(st)}</div>
              <img alt="Баннер: ${escapeHtml(p.title)}" src="${p.bannerDataUrl}" loading="lazy" />
            </div>
            <div class="content">
              <h2 class="title">${escapeHtml(p.title)}</h2>

              <div class="pills">
                <span class="pill strong">Период: ${escapeHtml(fmtRange(p.startDate, p.endDate))}</span>
                ${p.brand ? `<span class="pill">Бренд: ${escapeHtml(p.brand)}</span>` : ""}
              </div>

              ${p.conditions ? `
                <div class="block">
                  <h3>Условия</h3>
                  <p>${escapeHtml(p.conditions)}</p>
                </div>
              ` : ""}

              ${p.noteSmall ? `<div class="noteSmall">${escapeHtml(p.noteSmall)}</div>` : ""}

              <div class="actions">
                ${btn(p.assortmentUrl, "🧾 Ассортимент", "btn primary")}
                ${btn(p.promoUrl, "🔎 Подробнее", "btn")}
                ${btn(p.leafletUrl, "📎 Листовка", "btn ghost")}
              </div>
            </div>
          </div>

          <div class="footerRow">
            <div>ID: ${escapeHtml(p.id)}</div>
            <div>Статус: ${statusLabel(st)}</div>
          </div>
        </article>
      `;
    }

    function smartSort(a, b){
      const rank = (p) => ({active:0, planned:1, ended:2}[statusOf(p)] ?? 9);
      const ra = rank(a), rb = rank(b);
      if (ra !== rb) return ra - rb;
      // внутри группы: по дате старта (раньше выше)
      return parseDate(a.startDate) - parseDate(b.startDate);
    }

    function sortList(list, mode){
      const arr = [...list];
      if (mode === "smart") arr.sort(smartSort);
      if (mode === "start_asc") arr.sort((a,b)=>parseDate(a.startDate)-parseDate(b.startDate));
      if (mode === "start_desc") arr.sort((a,b)=>parseDate(b.startDate)-parseDate(a.startDate));
      if (mode === "end_asc") arr.sort((a,b)=>parseDate(a.endDate)-parseDate(b.endDate));
      if (mode === "end_desc") arr.sort((a,b)=>parseDate(b.endDate)-parseDate(a.endDate));
      return arr;
    }

    function render(){
      const q = (elQ.value || "").trim().toLowerCase();
      const st = elStatus.value;
      const sortMode = elSort.value;

      let filtered = promos.filter(p => {
        const matchesStatus = (st === "all") ? true : statusOf(p) === st;
        const hay = [p.title, p.brand, p.conditions].filter(Boolean).join(" ").toLowerCase();
        const matchesQ = q ? hay.includes(q) : true;
        return matchesStatus && matchesQ;
      });

      filtered = sortList(filtered, sortMode);

      elList.innerHTML = filtered.map(card).join("");
      elEmpty.style.display = filtered.length ? "none" : "block";

      elCountLine.textContent = `Показано: ${filtered.length} из ${promos.length}`;
      const now = new Date();
      elTodayLine.textContent = `Сегодня: ${now.toLocaleDateString("ru-RU")}`;
    }

    elQ.addEventListener("input", render);
    elStatus.addEventListener("change", render);
    elSort.addEventListener("change", render);
    render();
  </script>
